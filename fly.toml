app = "fresh-water-music"
primary_region = "ewr"

[build]
  image = "nginx:alpine"

[[statics]]
  guest_path = "/usr/share/nginx/html"
  url_prefix = "/"
  source = "public"

[[services]]
  protocol = "tcp"
  internal_port = 80
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443
